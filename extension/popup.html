<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- 状态栏 -->
    <div id="status-bar" class="status-bar hidden">
      <span id="status-icon">●</span>
      <span id="status-text">后端未连接</span>
    </div>

    <!-- 主界面 -->
    <div id="main-view">
      <h1>Bili Analyzer</h1>
      <p id="video-title" class="video-title">请在 B 站视频页面使用</p>

      <div class="form-group">
        <label for="source-select">转录方式</label>
        <select id="source-select">
          <option value="bilibili_api">B站字幕（推荐）</option>
          <option value="whisper_local">Whisper 本地</option>
        </select>
      </div>

      <div id="whisper-model-group" class="form-group hidden">
        <label for="model-select">Whisper 模型</label>
        <select id="model-select">
          <option value="tiny">tiny（最快）</option>
          <option value="base" selected>base（推荐）</option>
          <option value="small">small（更准）</option>
          <option value="medium">medium（高质量）</option>
          <option value="large-v3">large-v3（最准）</option>
        </select>
      </div>

      <button id="btn-analyze" class="btn-primary" disabled>分析视频</button>
    </div>

    <!-- 分析（进度 + 结果统一视图）-->
    <div id="analysis-view" class="hidden">
      <div id="analysis-preview" class="result-preview"></div>
      <div id="analysis-progress">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <p id="progress-text">准备中...</p>
      </div>
      <div id="analysis-actions" class="hidden">
        <div class="btn-group">
          <button id="btn-copy" class="btn-secondary">复制 Markdown</button>
          <button id="btn-download" class="btn-primary">下载笔记</button>
        </div>
        <button id="btn-reanalyze" class="btn-link">重新分析</button>
      </div>
    </div>

    <!-- 错误 -->
    <div id="error-view" class="hidden">
      <p id="error-text" class="error-text"></p>
      <button id="btn-retry" class="btn-secondary">重试</button>
    </div>
  </div>

  <!-- 术语追问弹窗 -->
  <div id="term-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="term-modal-name"></h3>
        <button id="term-modal-close" class="modal-close-btn">&times;</button>
      </div>
      <p id="term-modal-explanation" class="modal-explanation"></p>
      <div id="term-modal-suggestions" class="modal-suggestions"></div>
      <div class="modal-ask-row">
        <input id="term-ask-input" type="text" placeholder="输入你的问题..." class="modal-input">
        <button id="term-ask-btn" class="btn-primary modal-ask-btn">问</button>
      </div>
      <div id="term-modal-answer" class="modal-answer"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
