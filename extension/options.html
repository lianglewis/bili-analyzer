<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Bili Analyzer 设置</title>
  <style>
    body {
      max-width: 480px;
      margin: 40px auto;
      font-family: -apple-system, "PingFang SC", sans-serif;
      font-size: 14px;
      color: #333;
      padding: 0 20px;
    }
    h1 { font-size: 20px; margin-bottom: 24px; color: #00a1d6; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-weight: 500; margin-bottom: 6px; }
    .field input, .field select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .field .hint { font-size: 12px; color: #999; margin-top: 4px; }
    .btn-save {
      padding: 10px 24px;
      background: #00a1d6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-save:hover { opacity: 0.9; }
    #msg { margin-top: 12px; color: #2e7d32; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Bili Analyzer 设置</h1>

  <div class="field">
    <label for="api-key">Claude API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-...">
    <p class="hint">后端通过环境变量 CLAUDE_API_KEY 读取，此处仅做备份存储。</p>
  </div>

  <div class="field">
    <label for="default-source">默认转录方式</label>
    <select id="default-source">
      <option value="bilibili_api">B站字幕（推荐）</option>
      <option value="whisper_local">Whisper 本地</option>
      <option value="cloud_api">云端 ASR</option>
    </select>
  </div>

  <div class="field">
    <label for="sessdata">B站 SESSDATA（可选）</label>
    <input type="password" id="sessdata" placeholder="登录后从浏览器 Cookie 获取">
    <p class="hint">部分视频字幕需要登录才能获取。从浏览器 Cookie 中复制 SESSDATA 的值。</p>
  </div>

  <button class="btn-save" id="btn-save">保存</button>
  <p id="msg"></p>

  <script src="options.js"></script>
</body>
</html>
