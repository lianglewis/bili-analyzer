name: BiliAnalyzer
options:
  bundleIdPrefix: com.bilianalyzer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  BiliAnalyzer:
    type: application
    platform: macOS
    sources:
      - path: BiliAnalyzer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bilianalyzer.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: BiliAnalyzer/BiliAnalyzer.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
